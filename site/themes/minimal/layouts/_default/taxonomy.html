{{ define "main" }}
<section>
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </header>

  <div class="post-list">
    {{ range .Paginator.Pages }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </div>

  {{ template "_internal/pagination.html" . }}
</section>
{{ end }}
