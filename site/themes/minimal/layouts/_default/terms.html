{{ define "main" }}
<section>
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </header>

  <ul class="term-cloud">
    {{ range .Data.Terms.Alphabetical }}
      <li>
        <a href="{{ .Page.RelPermalink }}">
          {{ .Page.Title }}
          <span class="term-count">{{ .Count }}</span>
        </a>
      </li>
    {{ end }}
  </ul>
</section>
{{ end }}
